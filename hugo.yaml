# Hugo configuration file
title: sumit's blog

# import PaperMod as module
module:
  imports:
  - path: github.com/adityatelange/hugo-PaperMod

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: essays
      url: /journal/
      weight: 1
    - name: notes
      url: /moments/
      weight: 2
    - name: about
      url: /about/
      weight: 3

params:
  defaultTheme: light
  disableThemeToggle: true
  ShowReadingTime: true
  ShowBreadCrumbs: false
  ShowPostNavLinks: true
  ShowShareButtons: false
  mainSections: ["journal", "moments"]

  cover:
    hidden: true
